components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: '0000'
    LoginResponse:
      type: object
      required:
        - message
        - token
      properties:
        message:
          type: string
        token:
          type: string
    MessageResponse:
      type: object
      properties:
        message:
          type: string
    Testcase:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: test-1
        link:
          type: string
          example: https://github.com/free5gc/free5gc#test-1
    GetTestcasesResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Testcases retrieved successfully
        testcases:
          type: array
          items:
            $ref: '#/components/schemas/Testcase'
    AddTestcasesRequest:
      type: object
      required:
        - testcases
      properties:
        testcases:
          type: array
          items:
            $ref: '#/components/schemas/Testcase'
    DeleteTestcasesRequest:
      type: object
      required:
        - testcases
      properties:
        testcases:
          type: array
          items:
            $ref: '#/components/schemas/Testcase'
    Tenant:
      type: object
      required:
        - username
        - role
      properties:
        username:
          type: string
          example: alonza
        role:
          type: string
          example: admin
    GetTenantsResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Tenants retrieved successfully
        tenants:
          type: array
          items:
            $ref: '#/components/schemas/Tenant'
    AddTenantsRequest:
      type: object
      required:
        - tenants
      properties:
        tenants:
          type: array
          items:
            $ref: '#/components/schemas/Tenant'
    DeleteTenantsRequest:
      type: object
      required:
        - tenants
      properties:
        tenants:
          type: array
          items:
            $ref: '#/components/schemas/Tenant'
    PR:
      type: object
      required:
        - number
        - title
      properties:
        number:
          type: integer
          example: 212
        title:
          type: string
          example: "gmm/handler: reject EAP-AKA' AuthenticationResponse with no EAPMessage"
    GetGithubPRsResponse:
      type: object
      required:
        - message
        - prs
      properties:
        message:
          type: string
          example: PRs retrieved successfully
        prs:
          type: array
          items:
            $ref: '#/components/schemas/PR'